<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>요약비서 - AI 유튜브·PDF 요약</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="app-header">
    <h1>📎 요약비서</h1>
    <p>YouTube 영상이나 PDF 문서를 AI가 핵심만 요약해드려요.</p>
  </header>

  <nav class="tabs">
    <button class="tab-btn active" data-tab="create">요약 생성</button>
    <button class="tab-btn" data-tab="history">히스토리</button>
  </nav>

  <main>
    <section id="create" class="tab-panel active">
      <div class="source-tabs">
        <button class="source-btn active" data-source="youtube">YouTube 링크</button>
        <button class="source-btn" data-source="pdf">PDF 업로드</button>
      </div>

      <form id="youtube-form" class="source-form">
        <label for="youtube-url">YouTube URL</label>
        <input type="url" id="youtube-url" placeholder="https://www.youtube.com/watch?v=..." required />
        <button type="submit">요약 생성</button>
      </form>

      <form id="pdf-form" class="source-form hidden">
        <label for="pdf-file">PDF 파일</label>
        <input type="file" id="pdf-file" accept="application/pdf" required />
        <button type="submit">요약 생성</button>
      </form>

      <div id="create-loading" class="loading hidden">
        <div class="spinner"></div>
        <p>AI가 요약을 생성하고 있어요. 잠시만 기다려주세요...</p>
      </div>

      <div id="create-error" class="error hidden"></div>

      <div id="create-result" class="result hidden"></div>
    </section>

    <section id="history" class="tab-panel">
      <div class="history-layout">
        <div id="history-list" class="history-list">
          <p class="empty">불러오는 중...</p>
        </div>
        <div id="history-detail" class="history-detail">
          <p class="empty">목록에서 항목을 선택하세요.</p>
        </div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
